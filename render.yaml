# Render Blueprint — déploie le backend (la base PostgreSQL est gérée à part).
# Dans Render : New → Blueprint → sélectionne ce dépôt. Render lira ce fichier.
# Les variables marquées sync:false seront demandées au moment du déploiement.
#
# BASE DE DONNÉES : DATABASE_URL est saisie manuellement (sync: false) car la
# base PostgreSQL existe déjà dans le compte Render (elle n'est pas gérée par
# ce blueprint). Où trouver la valeur : Dashboard Render → votre base
# PostgreSQL → onglet « Info » → « Internal Database URL » (si la base et le
# service sont dans la même région) — sinon « External Database URL ».
# NE JAMAIS mettre cette URL dans ce fichier ni dans GitHub.
#
# (Alternative si vous préférez une base gérée par le blueprint : recréez un
#  bloc `databases:` et remplacez l'entrée DATABASE_URL par
#  `fromDatabase: { name: <nom>, property: connectionString }`.)

services:
  - type: web
    name: pronos-backend
    runtime: node
    plan: free            # ⚠️ le plan free se met en veille : voir note CLV dans le README
    rootDir: pronos-backend
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false                # OBLIGATOIRE — Internal Database URL de votre base (voir en-tête)
      - key: JWT_SECRET
        generateValue: true        # généré automatiquement par Render
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: JOBS_ENABLED
        value: "true"
      - key: ODDS_API_KEY
        sync: false                # OBLIGATOIRE — demandé au déploiement
      # TRACKED_SPORTS : optionnel. Non défini = liste par défaut
      # (Ligue 1, EPL, Liga, Serie A, Bundesliga, LdC, NBA, tennis).
      - key: ODDS_REGIONS
        value: eu,uk
      - key: ODDS_MARKETS
        value: h2h,spreads,totals
      - key: ODDS_FORMAT
        value: decimal
      - key: ODDS_DATE_FORMAT
        value: iso
      - key: SYNC_INTERVAL_MINUTES
        value: "15"
      - key: MIN_EDGE_PERCENT
        value: "3"
      - key: MIN_CONFIDENCE
        value: "60"
      - key: MAX_PRONOS_PER_SYNC
        value: "30"
      - key: ANTHROPIC_API_KEY
        sync: false                # optionnel (avis IA)
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-5
      - key: CORS_ORIGINS
        sync: false                # mets ici l'URL Vercel exacte (https, sans / final)
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false                # ton email admin
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false                # ton mot de passe admin (fort)
      - key: MIN_RELIABILITY
        value: "60"
      - key: MIN_EV
        value: "0.02"
      - key: MAX_RISK
        value: moyen
      - key: START_BANKROLL
        value: "100"
