services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: pronos
      POSTGRES_PASSWORD: pronos
      POSTGRES_DB: pronos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pronos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
